apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-dev
  namespace: argocd
spec:
  project: wellness
  source:
    repoURL: https://github.com/luisrodvilladaorg/wellness-gitops
    targetRevision: main
    path: ingress/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
