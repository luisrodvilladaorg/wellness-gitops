apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-dev
  namespace: argocd
spec:
  project: wellness
  source:
    repoURL: https://github.com/luisrodvilladaorg/wellness-gitops
    targetRevision: main
    path: k8s/overlays/dev/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
