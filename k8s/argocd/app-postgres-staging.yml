apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-staging
  namespace: argocd
spec:
  project: wellness
  source:
    repoURL: https://github.com/luisrodvilladaorg/wellness-gitops
    targetRevision: main
    path: k8s/overlays/staging/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true