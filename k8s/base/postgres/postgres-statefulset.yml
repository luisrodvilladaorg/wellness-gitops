apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432

          # ✅ AÑADIDO — arranca postgres con SSL habilitado y apunta a los certs
          command:
            - docker-entrypoint.sh
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/etc/ssl/postgresql/server.crt
            - -c
            - ssl_key_file=/etc/ssl/postgresql/server.key

          envFrom:
            - secretRef:
                name: postgres-secret

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # ✅ AÑADIDO — monta el Secret con los certs dentro del pod
            - name: postgres-ssl
              mountPath: /etc/ssl/postgresql
              readOnly: true

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 10
            periodSeconds: 5

          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres
            failureThreshold: 30
            periodSeconds: 10

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      # ✅ AÑADIDO — declara el volumen que viene del Secret postgres-ssl
      volumes:
        - name: postgres-ssl
          secret:
            secretName: postgres-ssl
            defaultMode: 0600

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi