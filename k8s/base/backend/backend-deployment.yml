apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
        env: prod
        version: v2.1.14
      annotations:
        deployed-by: luisrodvillada
        description: Backend service for Wellness Ops application
        prometheus.io/port: "3000"
        prometheus.io/scrape: "true"

    spec:
      initContainers:
      - name: wait-for-postgres
        image: ghcr.io/luisrodvilladaorg/wellness-ops-postgres-init:latest
        command:
          - sh
          - -c
          - |
            until pg_isready -h postgres-service -p 5432; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done

      containers:
      - name: backend
        image: ghcr.io/luisrodvilladaorg/wellness-ops-backend:v2.1.14
        imagePullPolicy: IfNotPresent

        envFrom:
          - configMapRef:
              name: backend-config
          - secretRef:
              name: backend-secret
          - secretRef:
              name: backend-jwt-secret

        ports:
          - containerPort: 3000

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

        volumeMounts:
          - name: backend-logs
            mountPath: /logs

      - name: log-sidecar
        image: busybox
        command:
          - sh
          - -c
          - |
            mkdir -p /logs
            touch /logs/app.log
            echo "Sidecar started..."
            tail -n+1 -F /logs/app.log

        volumeMounts:
          - name: backend-logs
            mountPath: /logs

      volumes:
        - name: backend-logs
          emptyDir: {}