apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: staging-wellness-tls
  namespace: staging
spec:
  secretName: staging-wellness-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: wellness-ca
    kind: ClusterIssuer
  commonName: staging.wellness.local
  dnsNames:
    - staging.wellness.local
